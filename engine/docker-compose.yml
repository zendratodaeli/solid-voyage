# Solid Vision — Weather Routing Engine
# Docker Compose for local development & single-server deployment

services:
  weather-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solid-vision-weather-engine
    ports:
      - "8001:8001"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8001
      - REBUILD_INTERVAL_HOURS=6
      - GRID_RESOLUTION=0.5
    volumes:
      # Persist NOAA data + land mask + ice cache between restarts
      # This avoids re-downloading ~200 MB of GRIB/NetCDF on every restart
      - engine-data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G  # Graph ~800MB + NOAA arrays ~1.5GB + ECMWF arrays ~1GB
        reservations:
          memory: 2G

volumes:
  engine-data:
