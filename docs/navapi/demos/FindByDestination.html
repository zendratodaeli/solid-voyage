  <div id="navapi-attribution-fixed">
    <img src="https://general-icons.navapi.cc/NavapiFavicon.svg" alt="icon" />
    <a href="https://navapi.com" target="_blank">navapi.com</a>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <!-- The only change: ensure the arrow rotates properly -->
  <script src="https://cdn.jsdelivr.net/npm/leaflet-rotatedmarker@0.2.0/leaflet.rotatedMarker.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/maneoverland/leaflet.WorldMiniMap/dist/Control.WorldMiniMap.js"></script>
  <script>
    const map = L.map('map', { attributionControl: false }).setView([0.0, 0.0], 3);

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Base/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 19,
      attribution: ''
    }).addTo(map);

    const worldMiniMap = L.control.worldMiniMap({
      position: 'bottomleft',
      mapOptions: {
        layers: [L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Base/MapServer/tile/{z}/{y}/{x}', { maxZoom: 12 })]
      }
    });
    worldMiniMap.addTo(map);

    const searchInput = document.getElementById('search-input');
    const clearBtn = document.getElementById('clear-btn');
    const apiBtn = document.getElementById('api-btn');
    const calendarBtn = document.getElementById('calendar-btn');
    const shiptypeBtn = document.getElementById('shiptype-btn');
    const resultsContainer = document.getElementById('results');
    const dateRangeContainer = document.getElementById('date-range-container');
    const applyDatesBtn = document.getElementById('apply-dates');
    const fromDateTime = document.getElementById('from-datetime');
    const toDateTime = document.getElementById('to-datetime');

    const shipTypeContainer = document.getElementById('shiptype-container');
    const shipTypeCloseBtn = document.getElementById('shiptype-close-btn');

    const markersLayer = L.layerGroup().addTo(map);
    const SHIP_ICON = L.icon({
      iconUrl: 'https://general-icons.navapi.cc/ShipIcon.svg',
      iconSize: [16, 16],
      iconAnchor: [8, 8]
    });

    let inFlightController = null;

    /* =================== API CONFIG (navapi.pro) =================== */
    // SECURITY NOTE: Add and save your Bearer token in the code, before calling the API.
    // Example: const AUTH_TOKEN = 'Bearer PASTE_YOUR_TOKEN_HERE';
    const AUTH_TOKEN = 'Bearer 29608fcfebe5855632b13a7ffc0ba79c1772020272281';

    const FIND_BY_DESTINATION_URL = 'https://v1.navapi.pro/aisp/mvsl/FindByDestination';

    function hasBearerToken() {
      const t = (AUTH_TOKEN || '').trim();
      return t.startsWith('Bearer ') && t.length > 7;
    }

    function toUtcIsoNoMs(localValue) {
      const d = new Date(localValue);
      if (Number.isNaN(d.getTime())) return null;
      return d.toISOString().replace(/\.\d{3}Z$/, 'Z');
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function displayVal(value) {
      if (value === null || value === undefined || value === '') return '—';
      return escapeHtml(value);
    }

    function displayNum(value, decimals = null) {
      const n = Number(value);
      if (!Number.isFinite(n)) return '—';
      return decimals === null ? String(n) : n.toFixed(decimals);
    }

    function buildPopup(vessel) {
      return `
        <table>
          <tr><td><strong>Name:</strong></td><td>${displayVal(vessel.ShipName)}</td></tr>
          <tr><td><strong>Flag:</strong></td><td>${displayVal(vessel.ShipFlag)}</td></tr>
          <tr><td><strong>IMO:</strong></td><td>${displayVal(vessel.ImoNumber)}</td></tr>
          <tr><td><strong>MMSI:</strong></td><td>${displayVal(vessel.MmsiNumber)}</td></tr>
          <tr><td><strong>Call Sign:</strong></td><td>${displayVal(vessel.CallSign)}</td></tr>
          <tr><td><strong>Ship Type:</strong></td><td>${displayVal(vessel.ShipType)}</td></tr>
          <tr><td><strong>Nav Status:</strong></td><td>${displayVal(vessel.NavigationStatus)}</td></tr>
          <tr><td><strong>Origin:</strong></td><td>${displayVal(vessel.OriginDeclared)}</td></tr>
          <tr><td><strong>Destination:</strong></td><td>${displayVal(vessel.DestDeclared)}</td></tr>
          <tr><td><strong>ETA:</strong></td><td>${displayVal(vessel.EtaDeclared)}</td></tr>
          <tr><td><strong>Latitude:</strong></td><td>${displayNum(vessel.Latitude, 6)}</td></tr>
          <tr><td><strong>Longitude:</strong></td><td>${displayNum(vessel.Longitude, 6)}</td></tr>
          <tr><td><strong>SOG (kt):</strong></td><td>${displayNum(vessel.SpeedOverGround, 1)}</td></tr>
          <tr><td><strong>COG (°):</strong></td><td>${displayNum(vessel.CourseOverGround, 0)}</td></tr>
          <tr><td><strong>CourseTx (°):</strong></td><td>${displayNum(vessel.CourseTransmitted, 0)}</td></tr>
          <tr><td><strong>Draught:</strong></td><td>${displayVal(vessel.DraughtDeclared)}</td></tr>
          <tr><td><strong>Last Updated:</strong></td><td>${displayVal(vessel.PositionLastUpdated)}</td></tr>
        </table>
      `;
    }

    /* ShipType checkbox behaviour:
       - "Select all Ship Types" checks every ShipType code (except [0])
       - [0] "All Ship Types (default)" stays mutually exclusive with specific codes
    */
    const shipTypeSelectAll = document.getElementById('shiptype-select-all');
    const shipTypeAllCheckbox = document.getElementById('shiptype-0');
    const shipTypeCheckboxes = Array.from(shipTypeContainer.querySelectorAll('input[type="checkbox"][value]'));
    const shipTypeSpecificCheckboxes = shipTypeCheckboxes.filter(cb => cb !== shipTypeAllCheckbox);
    const ALL_SHIP_TYPES = shipTypeSpecificCheckboxes.map(cb => cb.value);

    function setDefaultShipTypes() {
      if (shipTypeSelectAll) {
        shipTypeSelectAll.checked = false;
        shipTypeSelectAll.indeterminate = false;
      }
      shipTypeCheckboxes.forEach(cb => cb.checked = false);
      if (shipTypeAllCheckbox) shipTypeAllCheckbox.checked = true;
    }

    function updateSelectAllState() {
      if (!shipTypeSelectAll) return;

      const checkedCount = shipTypeSpecificCheckboxes.filter(cb => cb.checked).length;
      if (checkedCount === 0) {
        shipTypeSelectAll.checked = false;
        shipTypeSelectAll.indeterminate = false;
      } else if (checkedCount === shipTypeSpecificCheckboxes.length) {
        shipTypeSelectAll.checked = true;
        shipTypeSelectAll.indeterminate = false;
      } else {
        shipTypeSelectAll.checked = false;
        shipTypeSelectAll.indeterminate = true;
      }
    }

    setDefaultShipTypes();

    if (shipTypeSelectAll) {
      shipTypeSelectAll.addEventListener('change', () => {
        const on = shipTypeSelectAll.checked;
        shipTypeSelectAll.indeterminate = false;

        shipTypeSpecificCheckboxes.forEach(cb => cb.checked = on);
        if (shipTypeAllCheckbox) shipTypeAllCheckbox.checked = !on;

        if (!on) {
          // Revert to initial default when user deselects "Select all".
          setDefaultShipTypes();
        } else {
          updateSelectAllState();
        }
      });
    }

    if (shipTypeAllCheckbox) {
      shipTypeAllCheckbox.addEventListener('change', () => {
        if (shipTypeAllCheckbox.checked) {
          shipTypeSpecificCheckboxes.forEach(cb => cb.checked = false);
          if (shipTypeSelectAll) {
            shipTypeSelectAll.checked = false;
            shipTypeSelectAll.indeterminate = false;
          }
        } else {
          const anySpecific = shipTypeSpecificCheckboxes.some(cb => cb.checked);
          if (!anySpecific) shipTypeAllCheckbox.checked = true;
        }
      });
    }

    shipTypeSpecificCheckboxes.forEach(cb => {
      cb.addEventListener('change', () => {
        if (cb.checked && shipTypeAllCheckbox) shipTypeAllCheckbox.checked = false;

        const anySpecific = shipTypeSpecificCheckboxes.some(x => x.checked);
        if (!anySpecific && shipTypeAllCheckbox) shipTypeAllCheckbox.checked = true;

        updateSelectAllState();
      });
    });

    // Set default times
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');

    fromDateTime.value = `${yyyy}-${mm}-${dd}T00:00`;
    toDateTime.value = `${yyyy}-${mm}-${dd}T23:59`;

    let storedFrom = fromDateTime.value;
    let storedTo = toDateTime.value;

    fromDateTime.addEventListener('change', () => {
      storedFrom = fromDateTime.value;
    });

    toDateTime.addEventListener('change', () => {
      storedTo = toDateTime.value;
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        resetDateTimes();
        hideShipTypeContainer();
      }
    });

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        processSearch();
      }
    });

    apiBtn.addEventListener('click', () => {
      processSearch();
    });

    clearBtn.addEventListener('click', () => {
      // On clear, reset date times to default
      resetDateTimes();
      // Clear selected ship types
      clearShipTypes();
      hideShipTypeContainer();
      clearSearch();
    });

    calendarBtn.addEventListener('click', (e) => {
      toggleDateRangeContainer();
      hideShipTypeContainer();
      e.stopPropagation();
    });

    applyDatesBtn.addEventListener('click', () => {
      storedFrom = fromDateTime.value;
      storedTo = toDateTime.value;
      toggleDateRangeContainer();
    });

    shiptypeBtn.addEventListener('click', (e) => {
      toggleShipTypeContainer();
      dateRangeContainer.style.display = 'none';
      e.stopPropagation();
    });

    shipTypeCloseBtn.addEventListener('click', () => {
      hideShipTypeContainer();
    });

    // Close on outside click
    document.addEventListener('click', (e) => {
      const isCalendarClick = dateRangeContainer.contains(e.target) || e.target === calendarBtn;
      const isShipTypeClick = shipTypeContainer.contains(e.target) || e.target === shiptypeBtn;

      if (!isCalendarClick) {
        dateRangeContainer.style.display = 'none';
      }

      if (!isShipTypeClick) {
        hideShipTypeContainer();
      }
    });

    function clearSearch() {
      searchInput.value = '';
      clearResults();
      markersLayer.clearLayers();
      map.setView([0.0, 0.0], 3);
    }

    function clearResults() {
      resultsContainer.innerHTML = '';
    }

    function toggleDateRangeContainer() {
      if (dateRangeContainer.style.display === 'none' || !dateRangeContainer.style.display) {
        dateRangeContainer.style.display = 'block';
      } else {
        dateRangeContainer.style.display = 'none';
      }
    }

    function toggleShipTypeContainer() {
      if (shipTypeContainer.style.display === 'none' || !shipTypeContainer.style.display) {
        shipTypeContainer.style.display = 'block';
      } else {
        shipTypeContainer.style.display = 'none';
      }
    }

    function hideShipTypeContainer() {
      shipTypeContainer.style.display = 'none';
    }

    function clearShipTypes() {
      setDefaultShipTypes();
    }

    function resetDateTimes() {
      fromDateTime.value = `${yyyy}-${mm}-${dd}T00:00`;
      toDateTime.value = `${yyyy}-${mm}-${dd}T23:59`;
      storedFrom = fromDateTime.value;
      storedTo = toDateTime.value;
    }

    async function processSearch() {
      const rawQuery = searchInput.value.trim();
      if (!rawQuery) return;

      clearResults();
      markersLayer.clearLayers();

      if (!hasBearerToken()) {
        resultsContainer.textContent = 'Add and save your Bearer token in the code, before calling the API (line 673)';
        return;
      }

      const destinations = rawQuery.split(',').map(d => d.trim()).filter(Boolean);
      if (destinations.length === 0) {
        resultsContainer.textContent = 'Please enter at least one destination (comma separated).';
        return;
      }

      if (!storedFrom || !storedTo) {
        resultsContainer.textContent = 'Please select From and To date-times before searching.';
        return;
      }

      const etaFromUtc = toUtcIsoNoMs(storedFrom);
      const etaUntilUtc = toUtcIsoNoMs(storedTo);
      if (!etaFromUtc || !etaUntilUtc) {
        resultsContainer.textContent = 'Invalid date-time values; Please re-select your From and To date-times.';
        return;
      }

      const fromMs = new Date(storedFrom).getTime();
      const untilMs = new Date(storedTo).getTime();
      if (Number.isFinite(fromMs) && Number.isFinite(untilMs) && fromMs > untilMs) {
        resultsContainer.textContent = 'The "From" date-time must be earlier than the "To" date-time.';
        return;
      }

      let shipTypeParam = '0';
      if (shipTypeSelectAll && shipTypeSelectAll.checked) {
        shipTypeParam = ALL_SHIP_TYPES.join(',');
      } else {
        const selected = shipTypeCheckboxes.filter(cb => cb.checked).map(cb => cb.value);
        shipTypeParam = (selected.length === 0 || selected.includes('0')) ? '0' : selected.join(',');
      }

      const requestBody = {
        DestDeclared: destinations,
        EtaFrom: etaFromUtc,
        EtaUntil: etaUntilUtc,
        ShipType: shipTypeParam
      };

      resultsContainer.textContent = 'Fetching data...';

      if (inFlightController) {
        inFlightController.abort();
      }
      inFlightController = new AbortController();
      const controller = inFlightController;

      try {
        const response = await fetch(FIND_BY_DESTINATION_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': AUTH_TOKEN.trim()
          },
          signal: controller.signal,
          body: JSON.stringify(requestBody)
        });

        let data = null;
        try { data = await response.json(); } catch (_) { data = null; }

        if (!response.ok) {
          const msg = (data && data.Metadata && data.Metadata.ResultMessage) ? data.Metadata.ResultMessage : `HTTP ${response.status}`;
          resultsContainer.textContent = `API call failed (${msg}).`;
          return;
        }

        const vessels = (data && data.ApiResults && Array.isArray(data.ApiResults.mvsl_FindByDestination))
          ? data.ApiResults.mvsl_FindByDestination
          : [];

          // Using a dedicated ship SVG icon (16x16) with rotation.

        const bounds = [];
        let plotted = 0;

        vessels.forEach(vessel => {
          const lat = Number(vessel.Latitude);
          const lon = Number(vessel.Longitude);
          if (!Number.isFinite(lat) || !Number.isFinite(lon)) return;

          const ct = Number(vessel.CourseTransmitted);
          const cog = Number(vessel.CourseOverGround);
          const rotation = (Number.isFinite(ct) && ct >= 0) ? ct : ((Number.isFinite(cog) && cog >= 0) ? cog : 0);

          const marker = L.marker([lat, lon], {
            icon: SHIP_ICON,
            rotationAngle: rotation,
            rotationOrigin: 'center center'
          }).addTo(markersLayer).bindPopup(buildPopup(vessel), { className: 'dark-popup' });

          bounds.push([lat, lon]);
          plotted += 1;
        });

        resultsContainer.textContent = `Found ${vessels.length} vessels; Plotted ${plotted} on map.`;

        if (bounds.length > 1) {
          map.fitBounds(bounds, { padding: [20, 20] });
        } else if (bounds.length === 1) {
          map.setView(bounds[0], 6);
        } else {
          map.setView([0.0, 0.0], 3);
        }

      } catch (error) {
        if (error && error.name === 'AbortError') {
          return;
        }
        console.error(error);
        resultsContainer.textContent = 'An error occurred while fetching data; Check the browser console (network/CORS).';
      } finally {
        if (inFlightController === controller) {
          inFlightController = null;
        }
      }
    }

  </script>
</body>
</html>
