       ============================ -->
  <style>
    :root { --item-height: 44px; } /* one row height; dropdown shows exactly 7 rows */

    html, body { height: 100%; }

    body {
      font-family: Arial, sans-serif;
      background: #272932; /* Dark background */
      color: white;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      font-size: 16px;
    }

    /* Top header: logo + endpoint + search */
    #top-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      flex-shrink: 0;
    }
    #logo { margin-bottom: 10px; width: 360px; }
    #endpoint-heading { margin-bottom: 20px; font-size: 18px; color: #e5e5e5; }

    /* Search bar & inline buttons */
    #search-container {
      position: relative;
      width: 33%;
      max-width: 450px;
      min-width: 280px;
      display: flex;
      align-items: center;
      margin-bottom: 0;
    }
    #search-input {
      padding: 10px;
      font-size: 16px;
      width: 100%;
      border: 1px solid #444;
      border-radius: 3px;
      background: #1f1f23;
      color: white;
      padding-right: 80px; /* space for icons */
      box-sizing: border-box;
    }
    #api-btn, #clear-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      padding: 0;
      line-height: 1;
      cursor: pointer;
    }
    #api-btn { right: 40px; }
    #clear-btn { right: 8px; }
    #api-btn img, #clear-btn img { max-height: 24px; max-width: 24px; object-fit: contain; }

    /* Autocomplete dropdown: exactly 7 rows visible; visible scrollbar */
    #autocomplete-list {
      position: absolute;
      top: calc(100% + 12px);
      left: 0;
      background: #1f1f23;
      border: 3px solid #aaa;
      border-radius: 3px;
      width: 100%;
      max-height: calc(7 * var(--item-height));
      overflow-y: auto;
      z-index: 999;
      display: none;
    }
    /* Thicker, more visible scrollbar */
    #autocomplete-list::-webkit-scrollbar { width: 16px; background: #3a3a3a; }
    #autocomplete-list::-webkit-scrollbar-thumb { background: #999; border-radius: 8px; border: 3px solid #666; }

    #autocomplete-list .item {
      height: var(--item-height);
      padding: 0 10px;
      display: flex;
      align-items: center;
      cursor: pointer;
      font-size: 16px;
      color: white;
      border-bottom: 1px solid #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #autocomplete-list .item:last-child { border-bottom: none; }
    #autocomplete-list .item:nth-child(odd) { background: #2c2c34; }
    #autocomplete-list .item:nth-child(even) { background: #1f1f23; }
    #autocomplete-list .item:hover { background: rgba(169,235,218,0.3); }
    #autocomplete-list .item.highlight { background: rgba(169,235,218,0.3) !important; }

    /* Map container */
    #map { flex: 1; width: 100%; margin-top: 0; position: relative; }
    .leaflet-container { background: #ffffff; color: #000000; }

    /* Left-bottom attribution badge (kept) */
    #custom-attribution {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: rgba(255,255,255,0.7);
      padding: 4px 8px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      font-size: 14px;
      color: #000;
    }
    #custom-attribution img { width: 20px; height: auto; margin-right: 6px; }

    /* Bottom-right badge now uses your favicon per request */
    #navapi-attribution-fixed {
      position: fixed;
      bottom: 8px;
      right: 8px;
      background: rgba(255,255,255,0.7);
      padding: 4px 8px;
      border-radius: 3px;
      font-size: 14px;
      color: #000;
      z-index: 1000;
      display: flex;
      align-items: center;
    }
    #navapi-attribution-fixed img { width: 20px; height: auto; margin-right: 6px; }
    #navapi-attribution-fixed a { color: #000; text-decoration: none; }

    /* Popup theme (only if the user clicks the selected circle) */
    .dark-popup .leaflet-popup-content-wrapper {
      background: #272932 !important; color: #fff !important;
      border: 1px solid #EF413D !important; box-shadow: none !important;
    }
    .dark-popup .leaflet-popup-content { margin: 5px 7px !important; line-height: 1.2em !important; font-size: 14px !important; }
    .dark-popup .leaflet-popup-tip { background: #272932 !important; }
    .dark-popup .leaflet-popup-content table { border-collapse: collapse; width: 100%; }
    .dark-popup .leaflet-popup-content tr { margin: 0; padding: 0; }
    .dark-popup .leaflet-popup-content td { margin: 0; padding: 2px 4px; vertical-align: top; }
    .dark-popup .leaflet-popup-content tr:nth-child(odd) { background: #2c2c34; }
    .dark-popup .leaflet-popup-content tr:nth-child(even) { background: #1f1f23; }
    .dark-popup .leaflet-popup-content table td:first-child strong { color: #DCE0E2 !important; }

  <!-- ============================
       MAP INIT: ESRI basemap + Minimap
       ============================ -->
  <script>
    // Create map first so later logic can use it safely
    const map = L.map('map', { attributionControl: false }).setView([51.505, -0.09], 5);

    // Main basemap: ESRI World Topo Map
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 19
    }).addTo(map);

    // Minimap: ESRI as well for consistency
    const worldMiniMap = L.control.worldMiniMap({
      position: 'bottomleft',
      mapOptions: {
        layers: [L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', { maxZoom: 12 })]
      }
    });
    worldMiniMap.addTo(map);
  </script>

ags.navapi.cc/ZAF-SouthAfricaFlag.svg","ZMB":"https://flags.navapi.cc/ZMB-ZambiaFlag.svg","ZWE":"https://flags.navapi.cc/ZWE-ZimbabweFlag.svg"};

    // ----------------------------
    // FETCHING & SHAPING RESULTS
    // ----------------------------
    async function fetchPorts(query) {
      // Cancel previous request (if any)
      if (currentAbort) currentAbort.abort();

      const controller = new AbortController();
      currentAbort = controller;

      const url = `${API_URL}?q=${encodeURIComponent(query)}`;
      const response = await fetch(url, {
        headers: { 'Authorization': AUTH_TOKEN },
        signal: controller.signal
      });

      if (!response.ok) throw new Error('Network response was not ok');

      const json = await response.json();
      const arr = (json && json.ApiResults && Array.isArray(json.ApiResults.autc_SeaPortSearch))
        ? json.ApiResults.autc_SeaPortSearch : [];

      // mark request done if this is the latest controller
      if (currentAbort === controller) currentAbort = null;

      return arr;
    }

    // Expand PortName aliases split by '/' and carry trailing parentheses e.g., "(Oregon)"
    function explodeAliases(port) {
      const name = port.PortName || 'Unknown';
      const trailing = name.match(/\s*(\([^()]*\))\s*$/);  // capture "(...)" at end
      const suffix = trailing ? ` ${trailing[1]}` : '';
      const base = trailing ? name.slice(0, trailing.index).trim() : name.trim();
      const parts = base.split('/').map(s => s.trim()).filter(Boolean);
      const uniq = Array.from(new Set(parts));
      return uniq.map(alias => {
        const displayHasParen = /\([^()]*\)\s*$/.test(alias);
        return {
          displayName: displayHasParen ? alias : (alias + suffix),
          Country: port.Country,
          PortCode: port.PortCode,
          Latitude: port.Latitude,
          Longitude: port.Longitude
        };
      });
    }

    function buildExpandedResults(rawPorts){
      const out = [];
      rawPorts.forEach(p => explodeAliases(p).forEach(a => out.push(a)));
      return out;
    }

    // ----------------------------
    // AUTOCOMPLETE RENDERING & UX
    // ----------------------------
    function renderAutocomplete(items){
      autocompleteList.innerHTML = '';
      if (!items.length){ hideAutocomplete(); return; }
      currentHighlightIndex = -1; // do not auto-sticky highlight the first row

      items.forEach((r, idx) => {
        const div = document.createElement('div');
        div.className = 'item';
        div.setAttribute('data-index', idx);

        // Optional flag icon; always show [COUNTRY] + name
        const flagURL = flagIcons[r.Country] || '';
        const flagImg = flagURL ? `<img src="${flagURL}" alt="${r.Country}" style="height:16px;width:auto;margin-right:6px;">` : '';
        div.innerHTML = `${flagImg}[${r.Country}] ${escapeHtml(r.displayName)}`;

        // Hover: move highlight + center map + show preview circle
        div.addEventListener('mouseenter', () => highlightItem(idx, true));
        // Click: select
        div.addEventListener('click', () => selectResult(idx));

        autocompleteList.appendChild(div);
      });
      autocompleteList.style.display = 'block';
    }

    function hideAutocomplete(){
      autocompleteList.style.display = 'none';
      autocompleteList.innerHTML = '';
      currentHighlightIndex = -1;
    }

    function highlightItem(index, centerMapToo=false){
      const items = autocompleteList.querySelectorAll('.item');
      items.forEach(i => i.classList.remove('highlight'));
      if (index >=0 && index < items.length){
        items[index].classList.add('highlight');
        currentHighlightIndex = index;
        const r = expandedResults[index];
        if (centerMapToo && r){
          map.setView([r.Latitude, r.Longitude], map.getZoom(), { animate: true });
          showPreviewCircle(r);
        }
      }
    }

    function navigateAutocomplete(direction){
      const items = autocompleteList.querySelectorAll('.item');
      if (!items.length) return;
      let newIndex = currentHighlightIndex;
      newIndex = (newIndex < 0) ? 0 : newIndex + direction;
      if (newIndex < 0) newIndex = items.length - 1;
      if (newIndex >= items.length) newIndex = 0;
      highlightItem(newIndex, true);
      items[newIndex].scrollIntoView({ block: 'nearest' });
    }

    function selectResult(idx){
      const r = expandedResults[idx];
      if (!r) return;
      hideAutocomplete();
      searchInput.value = r.displayName;
      clearPreviewCircle();
      showSelectedPort(r);
    }

    // ----------------------------
    // MARKERS: preview (#272932) & selected (#EF413D), both solid with white center
    // ----------------------------
    function clearPreviewCircle(){
      if (previewOuter){ previewOuter.remove(); previewOuter = null; }
      if (previewInner){ previewInner.remove(); previewInner = null; }
      if (previewMarker){ map.removeLayer(previewMarker); previewMarker = null; }
}
    function clearSelectedCircle(){
      if (selectedOuter){ selectedOuter.remove(); selectedOuter = null; }
      if (selectedInner){ selectedInner.remove(); selectedInner = null; }
      if (selectedMarker){ map.removeLayer(selectedMarker); selectedMarker = null; }
}

    function showPreviewCircle(r){
      clearPreviewCircle();
      const inactiveIcon = L.icon({
        iconUrl: 'https://icons.navapi.cc/LocationInactive.svg',
        iconSize: [32, 32],
        iconAnchor: [16, 32],
        popupAnchor: [0, -28]
      });
      previewMarker = L.marker([r.Latitude, r.Longitude], { icon: inactiveIcon, keyboard: false }).addTo(map);
      if (selectedMarker) { try { previewMarker.bringToBack(); } catch(e){} }
}

    function showSelectedPort(r){
      clearSelectedCircle();
      const activeIcon = L.icon({
        iconUrl: 'https://icons.navapi.cc/LocationActive.svg',
        iconSize: [34, 34],
        iconAnchor: [17, 34],
        popupAnchor: [0, -30]
      });
      selectedMarker = L.marker([r.Latitude, r.Longitude], { icon: activeIcon, keyboard: false }).addTo(map);

      const popupHtml = `
        <table>
          <tr><td><strong>Port:</strong></td><td>${escapeHtml(r.displayName)}</td></tr>
          <tr><td><strong>Country:</strong></td><td>${escapeHtml(r.Country || 'N/A')}</td></tr>
          <tr><td><strong>UN/LOCODE:</strong></td><td>${escapeHtml(r.PortCode || 'N/A')}</td></tr>
          <tr><td><strong>Latitude:</strong></td><td>${Number(r.Latitude).toFixed(6)}</td></tr>
          <tr><td><strong>Longitude:</strong></td><td>${Number(r.Longitude).toFixed(6)}</td></tr>
        </table>`;
      try { selectedMarker.bindPopup(popupHtml, { className: 'dark-popup' }); } catch(e){}

      map.setView([r.Latitude, r.Longitude], Math.max(map.getZoom(), 8));
}

    // ----------------------------
    // HELPERS
    // ----------------------------
    function escapeHtml(str){
      return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
    }
    function clearSearch(){
      searchInput.value = '';
      hideAutocomplete();
      clearPreviewCircle();
      clearSelectedCircle();

      // cancel any in-flight request
      if (currentAbort) { currentAbort.abort(); currentAbort = null; }

      backspaceCount = 0;
      deleteCount = 0;
    }

    // ----------------------------
    // EVENTS: input typing, keys, buttons
    // ----------------------------
    searchInput.addEventListener('input', async () => {
      const q = searchInput.value.trim();

      // If fewer than 3 chars, hide & cancel any in-flight request
      if (q.length < 3) {
        hideAutocomplete();
        clearPreviewCircle();
        if (currentAbort) { currentAbort.abort(); currentAbort = null; }
        return;
      }

      try {
        const rawPorts = await fetchPorts(q);
        expandedResults = buildExpandedResults(rawPorts);
        renderAutocomplete(expandedResults);
      } catch (e) {
        if (e.name !== 'AbortError') {
          console.error(e);
          hideAutocomplete();
        }
      }
    });

    clearBtn.addEventListener('click', clearSearch);
    apiBtn.addEventListener('click', () => {
      if (!expandedResults.length) return;
      const idx = (currentHighlightIndex >= 0) ? currentHighlightIndex : 0;
      selectResult(idx);
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape'){ e.preventDefault(); clearSearch(); return; }
      if (e.key === 'ArrowDown'){ e.preventDefault(); navigateAutocomplete(1); return; }
      if (e.key === 'ArrowUp'){ e.preventDefault(); navigateAutocomplete(-1); return; }
      if (e.key === 'Enter'){
        e.preventDefault();
        if (!expandedResults.length) return;
        const idx = (currentHighlightIndex >= 0) ? currentHighlightIndex : 0;
        selectResult(idx);
        return;
      }

      if (e.key === 'Backspace'){
        backspaceCount++;
        if (backspaceCount >= 4) { clearSearch(); }
        return; // let default text deletion happen; input handler will see empty state
      }
      if (e.key === 'Delete'){
        deleteCount++;
        if (deleteCount >= 4) { clearSearch(); }
        return;
      }

      // Any other key resets the quick-clear counters
      backspaceCount = 0;
      deleteCount = 0;
    });
  </script>
