<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NavAPI v1 • Ship Search & Last Position</title>
<link rel="icon" type="image/svg+xml" href="https://general-icons.navapi.cc/NavapiFavicon.svg" />

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/maneoverland/leaflet.WorldMiniMap/dist/Control.WorldMiniMap.css" />

<style>
  html, body { height: 100%; }
  body {
    font-family: Arial, sans-serif;
    background: #272932; color: #fff; margin: 0; padding: 0;
    display: flex; flex-direction: column; font-size: 16px;
  }

  /* Top area */
  #top-container { display:flex; flex-direction:column; align-items:center; padding:20px; flex-shrink:0; }
  #logo { margin-bottom:10px; width:360px; }
  #endpoint-heading { margin:0 0 16px 0; font-size:18px; color:#e5e5e5; text-align:center; }

  /* Search box */
  #search-container { position:relative; width:33%; max-width:560px; min-width:280px; display:flex; align-items:center; }
  #search-input {
    padding: 10px; font-size:16px; width:100%;
    border:1px solid #444; border-radius:3px;
    background:#1f1f23; color:#fff; padding-right:84px; box-sizing:border-box;
  }
  #api-btn, #clear-btn { position:absolute; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; line-height:1; }
  #api-btn { right:42px; }
  #clear-btn { right:8px; }
  #api-btn img, #clear-btn img { max-height:24px; max-width:24px; object-fit:contain; }
  #error { margin-top:8px; color:#ff6b6b; display:none; }

  /* Autocomplete */
  #autocomplete-list {
    position:absolute; top: calc(100% + 10px); left:0; right:0;
    background:#1f1f23; border: 3px solid #aaa; border-radius:3px;
    max-height: 320px; overflow-y:auto; z-index: 1000; display:none;
    scrollbar-color: #ffffff #333333;        /* Firefox: thumb white, track dark */
    scrollbar-width: thin;
  }
  /* WebKit (Chrome/Edge/Safari) */
  #autocomplete-list::-webkit-scrollbar { width: 12px; background:#333; }
  #autocomplete-list::-webkit-scrollbar-thumb { background:#fff; border-radius:3px; }

  .ac-item { padding:8px; cursor:pointer; font-size:16px; color:#fff; display:flex; flex-direction:column; border-bottom:1px solid #888; }
  .ac-item:last-child { border-bottom:none; }
  .ac-item:nth-child(odd)  { background:#2b2f3a; }
  .ac-item:nth-child(even) { background:#1f232c; }
  /* IMPORTANT: no :hover highlight → JS controls highlight so only one item looks active */
  .ac-item.highlight { background: rgba(169,235,218,0.28) !important; outline: 1px solid rgba(255,255,255,.15); }
  .vessel-name { font-weight:bold; margin-bottom:2px; display:flex; align-items:center; gap:8px; }
  .vessel-name img { width:24px; height:16px; object-fit:contain; border:1px solid rgba(255,255,255,.15); }
  .vessel-ids { font-size:13px; color:#cfd3d7; }

  /* Map */
  #map { flex:1; width:100%; position:relative; }
  .leaflet-container { background:#fff; color:#000; }

  /* Attributions (Denmark flag as requested) */
  #custom-attribution, #navapi-attribution-fixed {
    position:absolute; background:rgba(255,255,255,0.7); padding:4px 8px; border-radius:3px; font-size:14px; color:#000; display:flex; align-items:center; gap:6px;
  }
  #custom-attribution { bottom:8px; left:8px; }
  #navapi-attribution-fixed { position:fixed; bottom:8px; right:8px; z-index:1000; }
  #custom-attribution img, #navapi-attribution-fixed img { width:20px; height:auto; }
  #navapi-attribution-fixed a { color:#000; text-decoration:none; }

  /* Popup styling: wider, thicker border, more contrast, white close button */
  .dark-popup .leaflet-popup-content-wrapper {
    background:#272932 !important; color:#fff !important; border:2px solid #EF413D !important; box-shadow:none !important;
  }
  .dark-popup .leaflet-popup-content {
    margin:6px 8px !important; line-height:1.25em !important; font-size:14px !important;
  }
  .dark-popup .leaflet-popup-tip { background:#272932 !important; border:3px solid #EF413D !important; }
  .dark-popup .leaflet-popup-content table { border-collapse:collapse; width:100%; }
  .dark-popup .leaflet-popup-content td { padding:4px 4px; vertical-align:top; }
  .dark-popup .leaflet-popup-content tr:nth-child(odd)  { background:#1b1e27; }
  .dark-popup .leaflet-popup-content tr:nth-child(even) { background:#323748; }
  .dark-popup .leaflet-popup-content tr { border-bottom:1px solid #4b5563; }
  .dark-popup .leaflet-popup-content tr:last-child { border-bottom:none; }
  .dark-popup .leaflet-popup-content table td:first-child strong { color:#DCE0E2 !important; }

  /* Make the close “X” clearly visible */
  .leaflet-container a.leaflet-popup-close-button {
    color:#fff !important; text-shadow: 0 0 3px rgba(0,0,0,.9); opacity: 1 !important;
    background: rgba(0,0,0,.25); border-radius: 50%;
  }

  /* Spinner (while fetching autocomplete/position) */
  .spinner { position:absolute; right:84px; top:50%; transform:translateY(-50%); width:16px; height:16px; border:2px solid #999; border-top-color:transparent; border-radius:50%; animation:spin 0.8s linear infinite; display:none; }
  @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
</style>

    0:'Under way (engine)',1:'At anchor',2:'Not under command',3:'Restricted manoeuvrability',4:'Constrained by draught',

  };
  function shipTypeLabel(code){
    const n = Number(code); if (isNaN(n)) return 'Unknown';
    if (n>=60 && n<70) return 'Passenger'; if (n>=70 && n<80) return 'Cargo'; if (n>=80 && n<90) return 'Tanker';
    if (n>=50 && n<60) return 'Special Purpose'; if (n>=40 && n<50) return 'Towing / Tugs';
    if (n>=30 && n<40) return 'Fishing'; if (n>=20 && n<30) return 'Wing in Ground';
    if (n>=90) return 'Other'; return 'Unknown';
  }

    "ZMB": "https://flags.navapi.cc/ZMB-ZambiaFlag.svg",
    "ZWE": "https://flags.navapi.cc/ZWE-ZimbabweFlag.svg"
  });
  function flagUrlFor(code){ if(!code) return ''; return FLAG_URLS[String(code).toUpperCase()] || ''; }

  /**************
   * UI ELEMENTS
   **************/
  const searchInput = document.getElementById('search-input');
  const clearBtn = document.getElementById('clear-btn');
  const apiBtn = document.getElementById('api-btn');
  const spinner = document.getElementById('spinner');
  const errorBox = document.getElementById('error');
  const acList = document.getElementById('autocomplete-list');

  let acIndex = -1;
  let currentMarker = null;

  // Abort/sequence guards to prevent stale responses updating the UI
  let autocompleteAbortCtrl = null;
  let autocompleteReqSeq = 0;
  let lastPosAbortCtrl = null;
  let lastPosReqSeq = 0;


  /**************
   * MAP
   **************/
  const map = L.map('map', { attributionControl: false }).setView([38.5, 12.0], 4);
  const BASEMAP_URL = 'https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Base/MapServer/tile/{z}/{y}/{x}';
  L.tileLayer(BASEMAP_URL, { maxZoom: 19 }).addTo(map);

  // Ship icon used for last position; scaled down 60%
  const SHIP_ICON_URL = 'https://general-icons.navapi.cc/ShipIcon.svg';
  const SHIP_ICON_SIZE = 17; // 42px * 0.40 = 16.8 → 17
  const SHIP_ICON = L.icon({
    iconUrl: SHIP_ICON_URL,
    iconSize: [SHIP_ICON_SIZE, SHIP_ICON_SIZE],
    iconAnchor: [SHIP_ICON_SIZE / 2, SHIP_ICON_SIZE / 2]
  });

  L.control.worldMiniMap({
    position: 'bottomleft',
    mapOptions: { layers: [L.tileLayer(BASEMAP_URL, { maxZoom: 12 })] }
  }).addTo(map);


  function hasValidBearerToken(token){
    const t = String(token || '').trim();
    if (!t) return false;
    if (t.includes('<') || t.includes('>')) return false;
    return /^Bearer\s+\S+$/i.test(t);
  }
  function ensureBearerTokenOrShowError(){
    if (hasValidBearerToken(NAVAPI_BEARER)) return true;
    showError('Add your Bearer Token and save before calling the API (line:131)');
    return false;
  }

  /****************
   * AUTOCOMPLETE *
   ****************/
  function debounce(fn, delay=300){ let t; return (...args)=>{ clearTimeout(t); t = setTimeout(()=>fn(...args), delay); }; }
  const onInput = debounce(async () => {
    const q = searchInput.value.trim();
    hideError();

    // If fewer than 3 non-space characters; reset autocomplete state
    if (q.replace(/\s+/g,'').length < 3) {
      if (autocompleteAbortCtrl) { try { autocompleteAbortCtrl.abort(); } catch (_) {} autocompleteAbortCtrl = null; }
      showSpinner(false);
      hideAutocomplete();
      return;
    }

    if (!ensureBearerTokenOrShowError()) { hideAutocomplete(); return; }

    // Cancel any in-flight autocomplete request
    const reqId = ++autocompleteReqSeq;
    if (autocompleteAbortCtrl) { try { autocompleteAbortCtrl.abort(); } catch (_) {} }
    autocompleteAbortCtrl = new AbortController();

    showSpinner(true);
    try {
      const res = await fetch(AUTOCOMPLETE_ENDPOINT(q), {
        headers: { 'Authorization': NAVAPI_BEARER },
        signal: autocompleteAbortCtrl.signal
      });
      if (!res.ok) throw new Error(`Autocomplete HTTP ${res.status}`);
      const json = await res.json();

      // Ignore stale responses
      if (reqId !== autocompleteReqSeq) return;

      const results = (json && json.ApiResults && json.ApiResults.autc_ShipSearch) ? json.ApiResults.autc_ShipSearch : [];
      showAutocomplete(results);
    } catch (err) {
      if (err && err.name === 'AbortError') return;
      showError('Autocomplete failed. Please try again.');
      hideAutocomplete();
      console.error(err);
    } finally {
      if (reqId === autocompleteReqSeq) showSpinner(false);
    }
  }, 280);

  searchInput.addEventListener('input', onInput);

  /* Keyboard: arrows + Enter + ESC + double-Backspace clear */
  let lastBackspaceTs = 0;
  let backspaceCount = 0;

  function handleKeyDown(e){
    const items = acList.querySelectorAll('.ac-item');
    if (e.key === 'ArrowDown') { e.preventDefault(); if (!items.length) return; setHighlight((acIndex+1) % items.length); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); if (!items.length) return; setHighlight((acIndex-1+items.length) % items.length); }
    else if (e.key === 'Enter') {
      e.preventDefault();
      if (acIndex >= 0 && items[acIndex]) { items[acIndex].click(); }
      else { smartDirectSearch(searchInput.value.trim()); }
    } else if (e.key === 'Escape') {
      e.preventDefault(); clearAll();
    } else if (e.key === 'Backspace') {
      const now = Date.now();
      if (now - lastBackspaceTs <= 1200) backspaceCount += 1; else backspaceCount = 1;
      lastBackspaceTs = now;
      if (backspaceCount >= 3) { e.preventDefault(); clearAll(); backspaceCount = 0; }
    }
  }
  searchInput.addEventListener('keydown', handleKeyDown);
  document.addEventListener('keydown', (e)=>{ if (e.key === 'Escape') { e.preventDefault(); clearAll(); } });

  function showAutocomplete(results){
    acList.innerHTML = ''; acIndex = -1;
    if (!results || !results.length) { acList.style.display='none'; return; }
    results.forEach((r, idx) => {
      const name = r.ShipName || 'Unknown';
      const imo  = r.ImoNumber || '—';
      const mmsi = r.MmsiNumber || '—';
      const cs   = r.CallSign || '—';
      const flag = r.ShipFlag || '';
      const flagUrl = flagUrlFor(flag);
      const flagImg = flagUrl ? `<img src="${flagUrl}" alt="${flag}" />` : '';
      const item = document.createElement('div');
      item.className = 'ac-item';
      item.innerHTML = `
        <div class="vessel-name">${flagImg}<span>${name}</span></div>
        <div class="vessel-ids">IMO: ${imo} &nbsp;•&nbsp; MMSI: ${mmsi} &nbsp;•&nbsp; Call sign: ${cs}</div>
      `;
      // Ensure only ONE highlight at a time – mouse
      item.addEventListener('mouseenter', () => setHighlight(idx));
      // Click to select
      item.addEventListener('click', () => {
        searchInput.value = name;
        hideAutocomplete();
        requestLastPosition({ name, mmsi, imo });
      });
      acList.appendChild(item);
    });
    acList.style.display = 'block';
  }

  function setHighlight(i) {
    const items = acList.querySelectorAll('.ac-item');
    items.forEach(el => el.classList.remove('highlight'));
    if (!items.length) { acIndex = -1; return; }
    acIndex = ((i % items.length) + items.length) % items.length;
    items[acIndex].classList.add('highlight');
    items[acIndex].scrollIntoView({ block:'nearest' });
  }
  function hideAutocomplete(){ acList.style.display='none'; acList.innerHTML=''; acIndex = -1; }

  /*********************
   * LAST POSITION FLOW
   *********************/
  async function requestLastPosition({ name = '', mmsi = '', imo = '' }) {
    hideError();
    if (!ensureBearerTokenOrShowError()) return;

    // Cancel any in-flight last-position request
    const reqId = ++lastPosReqSeq;
    if (lastPosAbortCtrl) { try { lastPosAbortCtrl.abort(); } catch (_) {} }
    lastPosAbortCtrl = new AbortController();

    showSpinner(true);
    try {
      const url = LASTPOS_ENDPOINT({ name: name || '', mmsi: onlyDigits(mmsi), imo: onlyDigits(imo) });
      const res = await fetch(url, {
        headers: { 'Authorization': NAVAPI_BEARER },
        signal: lastPosAbortCtrl.signal
      });
      if (!res.ok) throw new Error(`LastPosition HTTP ${res.status}`);
      const json = await res.json();

      // Ignore stale responses
      if (reqId !== lastPosReqSeq) return;

      const arr = (json && json.ApiResults && json.ApiResults.svsl_LastPosition) ? json.ApiResults.svsl_LastPosition : [];
      if (!arr.length) { showError('No last position found for this vessel.'); return; }
      showOnMap(arr[0]);
    } catch (err) {
      if (err && err.name === 'AbortError') return;
      showError('Could not retrieve last position. Please try again.');
      console.error(err);
    } finally {
      if (reqId === lastPosReqSeq) showSpinner(false);
    }
  }

  function showOnMap(v) {
    const lat = Number(v.Latitude), lon = Number(v.Longitude);
    if (isNaN(lat) || isNaN(lon)) { showError('This vessel record has no valid coordinates.'); return; }

    if (currentMarker) { currentMarker.remove(); currentMarker = null; }

    const courseTxRaw = Number(v.CourseTransmitted);
    const courseTx = Number.isFinite(courseTxRaw) ? ((courseTxRaw % 360) + 360) % 360 : 0;

    currentMarker = L.marker([lat, lon], {
      icon: SHIP_ICON,
      rotationAngle: courseTx,
      rotationOrigin: 'center center'
    }).addTo(map);

    const loa  = (isNum(v.DimensionA) && isNum(v.DimensionB)) ? (Number(v.DimensionA) + Number(v.DimensionB)) : null;
    const beam = (isNum(v.DimensionC) && isNum(v.DimensionD)) ? (Number(v.DimensionC) + Number(v.DimensionD)) : null;
    const flag = v.ShipFlag || '';
    const flagUrl = flagUrlFor(flag);
    const flagImg = flagUrl ? `<img src="${flagUrl}" alt="${flag}" style="width:24px;height:16px;vertical-align:middle;border:1px solid rgba(255,255,255,.15)"/>` : '';

    /* EXACTLY one field per row; popup made wider via maxWidth/minWidth below */
    const popup = `
      <table>
        <tr><td><strong>Name</strong></td><td>${safe(v.ShipName) || '—'}</td></tr>
        <tr><td><strong>Flag</strong></td><td>${flagImg} ${flag || '—'}</td></tr>
        <tr><td><strong>MMSI</strong></td><td>${safe(v.MmsiNumber)||'—'}</td></tr>
        <tr><td><strong>IMO</strong></td><td>${safe(v.ImoNumber)||'—'}</td></tr>
        <tr><td><strong>Call sign</strong></td><td>${safe(v.CallSign)||'—'}</td></tr>
        <tr><td><strong>Ship type</strong></td><td>${v.ShipType ?? '—'} (${shipTypeLabel(v.ShipType)})</td></tr>
        <tr><td><strong>Navigation status</strong></td><td>${NAV_STATUS[Number(v.NavigationStatus)] || v.NavigationStatus || '—'}</td></tr>
        <tr><td><strong>Speed over ground</strong></td><td>${fmtNum(v.SpeedOverGround)} kn</td></tr>
        <tr><td><strong>Course over ground</strong></td><td>${fmtNum(v.CourseOverGround)}°</td></tr>
        <tr><td><strong>Course transmitted</strong></td><td>${fmtNum(v.CourseTransmitted)}°</td></tr>
        <tr><td><strong>Origin (decl.)</strong></td><td>${safe(v.OriginDeclared)||'—'}</td></tr>
        <tr><td><strong>Destination (decl.)</strong></td><td>${safe(v.DestDeclared)||'—'}</td></tr>
        <tr><td><strong>ETA (decl.)</strong></td><td>${safe(v.EtaDeclared)||'—'}</td></tr>
        <tr><td><strong>LOA</strong></td><td>${loa ? loa+' m' : '—'}</td></tr>
        <tr><td><strong>Beam</strong></td><td>${beam ? beam+' m' : '—'}</td></tr>
        <tr><td><strong>Draught (decl.)</strong></td><td>${fmtNum(v.DraughtDeclared)} m</td></tr>
        <tr><td><strong>Position time</strong></td><td>${safe(v.PositionLastUpdated)||'—'}</td></tr>
        <tr><td><strong>Latitude</strong></td><td>${lat.toFixed(5)}</td></tr>
        <tr><td><strong>Longitude</strong></td><td>${lon.toFixed(5)}</td></tr>
      </table>
    `;
    currentMarker.bindPopup(popup, { className: 'dark-popup', maxWidth: 560, minWidth: 360 });  // wider popup
    map.setView([lat, lon], 6);
  }

  /*****************
   * HELPERS & UI  *
   *****************/
  function onlyDigits(s){ return (s || '').toString().replace(/\D+/g,''); }
  function isNum(v){ return v !== null && v !== undefined && !isNaN(Number(v)); }
  function fmtNum(v){ return isNum(v) ? Number(v).toFixed(1).replace(/\.0$/,'') : '—'; }
  function safe(s){ return (s===0 || s) ? String(s) : ''; }

  function showSpinner(show){ spinner.style.display = show ? 'block' : 'none'; }
  function showError(msg){ errorBox.textContent = msg; errorBox.style.display = 'block'; }
  function hideError(){ errorBox.textContent = ''; errorBox.style.display = 'none'; }

  function clearAll(){
    hideAutocomplete(); hideError(); searchInput.value=''; searchInput.focus();
    showSpinner(false);

    // Cancel in-flight requests so the UI cannot be updated by stale responses after clearing
    if (autocompleteAbortCtrl) { try { autocompleteAbortCtrl.abort(); } catch (_) {} autocompleteAbortCtrl = null; }
    if (lastPosAbortCtrl) { try { lastPosAbortCtrl.abort(); } catch (_) {} lastPosAbortCtrl = null; }

    if (currentMarker){ currentMarker.remove(); currentMarker = null; }
  }
  clearBtn.addEventListener('click', clearAll);
  apiBtn.addEventListener('click', () => {
    const q = searchInput.value.trim();
    if (!q) return;
    const items = acList.querySelectorAll('.ac-item');
    if (acIndex >= 0 && items[acIndex]) { items[acIndex].click(); return; }
    smartDirectSearch(q);
  });

  // Try to infer whether the entered string is MMSI, IMO or Name/CallSign and query LastPosition directly
  function smartDirectSearch(q) {
    const digits = q.replace(/\D+/g,'');
    if (digits.length === 9) { requestLastPosition({ mmsi: digits }); return; }   // MMSI
    if (digits.length === 7) { requestLastPosition({ imo: digits }); return; }    // IMO
    requestLastPosition({ name: q }); // Fallback to Name
  }
  </script>
