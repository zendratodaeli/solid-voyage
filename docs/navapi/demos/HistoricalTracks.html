    function getFlagURL(flagCode) {
      if (!flagCode) return '';
      const raw = String(flagCode).trim();
      if (!raw) return '';
      if (flagIcons[raw]) return flagIcons[raw];
      const upper = raw.toUpperCase();
      if (flagIcons[upper]) return flagIcons[upper];
      const lower = raw.toLowerCase();
      if (flagIcons[lower]) return flagIcons[lower];
      const legacy = { eng: 'XENG', abkhazia: 'XABK', nato: 'XNTO' };
      const key = legacy[lower];
      return key && flagIcons[key] ? flagIcons[key] : '';
    }

    /* =================== STATE =================== */
    let shipSelected = false;
    let currentMarker = null;
    let currentVessel = null; // { mmsi, name, imo, call_sign, flag }
    let trackPolylines = [];
    let startDate = null;
    let endDate = null;
    let currentHighlightIndex = -1;
    let currentResults = [];
    let arrowMarkers = [];
    let autocompleteReqSeq = 0;

    const DEFAULT_MAP_CENTER = [51.505, -0.09];
    const DEFAULT_MAP_ZOOM = 5;

    // Double-backspace reset (only after a vessel has been selected)
    let backspaceResetPrimed = false;
    let backspaceResetTimer = null;
    const DOUBLE_BACKSPACE_WINDOW_MS = 800;

    // recenter-on-pan cache
    let originalTrackLatLngs = null;     // [[lat, lon], ...]
    let originalTrackPositions = null;   // vendor objects (for popups/COG/SOG)
    let currentRefLon = null;            // current "window" reference

      .setView(DEFAULT_MAP_CENTER, DEFAULT_MAP_ZOOM);

      maxZoom: 19,

      'https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Base/MapServer/tile/{z}/{y}/{x}',
      { maxZoom: 19, attribution: '' }
    );

    const basemapEsriTopo = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}',
      { maxZoom: 19, attribution: '' }

      position: 'bottomleft',

      "OpenStreetMap": basemapOSM,

    /* =================== CALENDAR =================== */
    let currentDate = new Date();
    let currentMonth = currentDate.getMonth();
    let currentYear = currentDate.getFullYear();
    let startMonth = currentMonth - 1;
    let startYear = currentYear;
    let normalized = normalizeYearMonth(startYear, startMonth);
    startYear = normalized.year;
    startMonth = normalized.month;

    searchInput.addEventListener('input', handleSearchInput);
    clearBtn.addEventListener('click', clearSearch);
    apiBtn.addEventListener('click', handleApiCall);
    document.addEventListener('keydown', handleKeydown);

    calendarCloseBtn.addEventListener('click', closeCalendar);

    function closeCalendar() {
      calendarWrapper.style.display = 'none';
      document.removeEventListener('mousedown', handleOutsideClick);
    }
    function toggleCalendar() {
      if (calendarWrapper.style.display === 'none' || calendarWrapper.style.display === '') {
        calendarWrapper.style.display = 'block';
        renderMonths();
        setTimeout(() => document.addEventListener('mousedown', handleOutsideClick), 0);
      } else { closeCalendar(); }
    }
    function handleOutsideClick(e) { if (!calendarWrapper.contains(e.target)) closeCalendar(); }

    /* =================== AUTOCOMPLETE (NEW RESPONSE SHAPE) =================== */
    async function handleSearchInput() {
      if (shipSelected) { clearResultsOnly(); shipSelected = false; currentVessel = null; }
      const query = searchInput.value.trim();
      const queryForAutocomplete = query.replace(/[^\w\s]/g, '').replace(/\s+/g, ' ');
      if (queryForAutocomplete.length < 3) { hideAutocomplete(); return; }

      const requestId = ++autocompleteReqSeq;
      try {
        const ships = await fetchAutocomplete(queryForAutocomplete);
        if (requestId !== autocompleteReqSeq) return;
        currentResults = ships;
        showAutocomplete(currentResults);
      } catch (e) {
        if (requestId !== autocompleteReqSeq) return;
        console.error(e);
        hideAutocomplete();
      }
    }
    async function fetchAutocomplete(query) {
      if (!isAuthTokenConfigured()) { showAuthTokenMissingError(); return []; }
      const url = `${AUTOCOMPLETE_URL}?Q=${encodeURIComponent(query)}`;
      const response = await fetch(url, { headers: { 'Authorization': AUTH_TOKEN } });
      if (!response.ok) throw new Error('Autocomplete failed');
      const data = await response.json();
      const arr = (data && data.ApiResults && data.ApiResults.autc_ShipSearch) ? data.ApiResults.autc_ShipSearch : [];
      // normalize to UI shape
      return arr.map(x => ({
        name: x.ShipName || '',
        imo: x.ImoNumber || '',
        mmsi: x.MmsiNumber || '',
        call_sign: x.CallSign || '',
        flag: x.ShipFlag || ''
      }));
    }
    function showAutocomplete(results) {
      autocompleteList.innerHTML = '';
      if (!results.length) { hideAutocomplete(); return; }
      currentHighlightIndex = -1;
      results.forEach(r => {
        const div = document.createElement('div');
        div.className = 'item';
        const flagURL = getFlagURL(r.flag);
        const flagImg = flagURL ? `<img src="${flagURL}" alt="${r.flag} Flag" />` : '';
        div.innerHTML = `
          <div class="vessel-name">${flagImg}${r.name || ''}</div>
          <div class="vessel-ids">[IMO: ${r.imo || '-'}] - [MMSI: ${r.mmsi || '-'}] - [Call Sign: ${r.call_sign || '-'}]</div>
        `;
        div.addEventListener('click', () => {
          div.classList.add('selected');
          setTimeout(() => {
            hideAutocomplete();
            searchInput.value = r.name || r.mmsi || r.imo || r.call_sign || '';
            clearResultsOnly();
            shipSelected = true;
            currentVessel = { mmsi: r.mmsi, name: r.name, imo: r.imo, call_sign: r.call_sign, flag: r.flag };
          }, 100);
        });
        autocompleteList.appendChild(div);
      });
      autocompleteList.style.display = 'block';
    }
    function hideAutocomplete() { autocompleteList.style.display = 'none'; autocompleteList.innerHTML = ''; currentHighlightIndex = -1; currentResults = []; }

    function clearBackspaceResetPriming() {
      backspaceResetPrimed = false;
      if (backspaceResetTimer) { clearTimeout(backspaceResetTimer); backspaceResetTimer = null; }
    }

    function hasActiveSelectionOrData() {
      return Boolean(
        shipSelected ||
        currentVessel ||
        currentMarker ||
        (trackPolylines && trackPolylines.length) ||
        (arrowMarkers && arrowMarkers.length) ||
        startDate ||
        endDate
      );
    }

    function handleKeydown(e) {
      // Any non-Backspace key cancels a pending double-Backspace reset
      if (e.key !== 'Backspace' && backspaceResetPrimed) clearBackspaceResetPriming();

      if (e.key === 'Escape') {
        if (hasActiveSelectionOrData()) {
          clearSearch();
        } else {
          hideAutocomplete();
          closeCalendar();
        }
        return;
      }

      if (e.key === 'Backspace') {
        // Double Backspace; only triggers if the first Backspace happened while a vessel was selected
        if (document.activeElement === searchInput) {
          if (backspaceResetPrimed) {
            e.preventDefault();
            clearBackspaceResetPriming();
            clearSearch();
            return;
          }
          if (shipSelected) {
            clearBackspaceResetPriming();
            backspaceResetPrimed = true;
            backspaceResetTimer = setTimeout(clearBackspaceResetPriming, DOUBLE_BACKSPACE_WINDOW_MS);
          }
        }
        return;
      }

      if (e.key === 'ArrowDown') { e.preventDefault(); navigateAutocomplete(1); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); navigateAutocomplete(-1); }
      else if (e.key === 'Enter') { e.preventDefault(); handleEnterKey(); }
    }

    function handleEnterKey() {
      if (!shipSelected) {
        const items = autocompleteList.querySelectorAll('.item');
        if (items.length > 0) {
          if (currentHighlightIndex >= 0 && currentHighlightIndex < items.length) {
            items[currentHighlightIndex].click();
          } else {
            currentHighlightIndex = 0; items[0].classList.add('highlight'); items[0].click();
          }
        }
      } else { handleApiCall(); }
    }
    function navigateAutocomplete(direction) {
      const items = autocompleteList.querySelectorAll('.item'); if (!items.length) return;
      if (currentHighlightIndex >= 0 && currentHighlightIndex < items.length) items[currentHighlightIndex].classList.remove('highlight');
      currentHighlightIndex += direction;
      if (currentHighlightIndex < 0) currentHighlightIndex = items.length - 1;
      if (currentHighlightIndex >= items.length) currentHighlightIndex = 0;
      items[currentHighlightIndex].classList.add('highlight');
      items[currentHighlightIndex].scrollIntoView({ block: 'nearest' });
    }

    /* =================== CLEAR / RESULTS =================== */
    function clearSearch() {
      clearBackspaceResetPriming();
      // Invalidate any in-flight autocomplete request
      autocompleteReqSeq++;

      searchInput.value = '';
      hideAutocomplete();
      clearResultsOnly();
      removeMarkerAndTrack();

      currentVessel = null;
      shipSelected = false;

      startDate = null;
      endDate = null;
      highlightSelection();

      originalTrackLatLngs = null;
      originalTrackPositions = null;
      currentRefLon = null;

      closeCalendar();
      map.setView(DEFAULT_MAP_CENTER, DEFAULT_MAP_ZOOM);
    }
    function clearResultsOnly() { resultsContainer.innerHTML = ''; }
    function removeMarkerAndTrack() {
      if (currentMarker) { currentMarker.remove(); currentMarker = null; }
      if (trackPolylines && trackPolylines.length) { trackPolylines.forEach(pl => pl.remove()); trackPolylines = []; }
      if (arrowMarkers && arrowMarkers.length) { arrowMarkers.forEach(m => m.remove()); arrowMarkers = []; }
    }

    /* =================== API HANDLERS (CHAIN WITH MMSI) =================== */
    function handleApiCall() {
      if (shipSelected && currentVessel) {
        if (startDate) fetchAndShowHistoricalTracks(currentVessel.mmsi, startDate, endDate);
        else fetchAndShowLastPosition(currentVessel.mmsi);
      } else {
        console.warn('No ship selected.');
      }
    }

    async function fetchAndShowLastPosition(mmsi) {
      if (!isAuthTokenConfigured()) { showAuthTokenMissingError(); return; }
      // Always pass MMSI and leave Name/Imo empty as per requirement
      const url = `${LAST_POSITION_URL}?Name=&Imo=&Mmsi=${encodeURIComponent(mmsi)}`;
      const response = await fetch(url, { headers: { 'Authorization': AUTH_TOKEN } });
      if (!response.ok) { console.error('Failed to fetch last position.'); return; }
      const data = await response.json();
      const arr = (data && data.ApiResults && data.ApiResults.svsl_LastPosition) ? data.ApiResults.svsl_LastPosition : [];
      if (!arr.length) return;
      const v = arr[0];

      const lat = parseFloat(v.Latitude);
      const lon = parseFloat(v.Longitude);
      if (!Number.isFinite(lat) || !Number.isFinite(lon)) {
        console.error('Invalid lat/lon in last position response', v.Latitude, v.Longitude);
        return;
      }

      removeMarkerAndTrack();

      // Ship icon: reduced size by 60%; rotated by CourseTransmitted (degrees)
      const courseTxRaw = v.CourseTransmitted;
      const courseTx = parseFloat(courseTxRaw);
      const courseTxDeg = Number.isFinite(courseTx) ? ((courseTx % 360) + 360) % 360 : null;

      const iconSizePx = 17;
      const customIcon = L.icon({
        iconUrl: 'https://general-icons.navapi.cc/ShipIcon.svg',
        iconSize: [iconSizePx, iconSizePx],
        iconAnchor: [iconSizePx / 2, iconSizePx / 2]
      });

      currentMarker = L.marker([lat, lon], {
        icon: customIcon,
        rotationAngle: (courseTxDeg !== null ? courseTxDeg : 0),
        rotationOrigin: 'center center'
      }).addTo(map);

      if (courseTxDeg !== null) {
        currentMarker.bindTooltip(`CourseTransmitted: ${courseTxDeg.toFixed(0)}°`, { direction: 'top', offset: [0, -10] });
      }

      const shipFlag = v.ShipFlag ?? '';
      const shipFlagURL = getFlagURL(shipFlag);
      const shipFlagImg = shipFlagURL ? `<img src="${shipFlagURL}" alt="${shipFlag} Flag" style="width:24px;height:16px;vertical-align:middle;margin-right:6px;" />` : '';

      const popupContent = `
        <table>
          <tr><td><strong>Name:</strong></td><td>${v.ShipName ?? ''}</td></tr>
          <tr><td><strong>Flag:</strong></td><td>${shipFlagImg}${shipFlag}</td></tr>
          <tr><td><strong>Ship Type:</strong></td><td>${v.ShipType ?? ''}</td></tr>
          <tr><td><strong>Nav Status:</strong></td><td>${v.NavigationStatus ?? ''}</td></tr>
          <tr><td><strong>Origin:</strong></td><td>${v.OriginDeclared ?? ''}</td></tr>
          <tr><td><strong>Destination:</strong></td><td>${v.DestDeclared ?? ''}</td></tr>
          <tr><td><strong>ETA:</strong></td><td>${v.EtaDeclared ?? ''}</td></tr>
          <tr><td><strong>Latitude:</strong></td><td>${v.Latitude}</td></tr>
          <tr><td><strong>Longitude:</strong></td><td>${v.Longitude}</td></tr>
          <tr><td><strong>SOG (kt):</strong></td><td>${v.SpeedOverGround ?? ''}</td></tr>
          <tr><td><strong>CourseTransmitted (°):</strong></td><td>${v.CourseTransmitted ?? ''}</td></tr>
          <tr><td><strong>COG (°):</strong></td><td>${v.CourseOverGround ?? ''}</td></tr>
          <tr><td><strong>Draught:</strong></td><td>${v.DraughtDeclared ?? ''}</td></tr>
          <tr><td><strong>Last Updated:</strong></td><td>${v.PositionLastUpdated ?? ''}</td></tr>
        </table>`;
      currentMarker.bindPopup(popupContent, { className: 'dark-popup' });
      map.setView([lat, lon], 6);
    }

    /* =================== ANTIMERIDIAN + RECENTER HELPERS =================== */
    function normalizeLon(lon) {
      return ((lon + 180) % 360 + 360) % 360 - 180;
    }
    function splitByAntimeridian(latlngs) {
      if (!latlngs || !latlngs.length) return [];
      const segs = [];
      let seg = [];
      for (let i = 0; i < latlngs.length - 1; i++) {
        let [lat1, lon1] = latlngs[i];
        let [lat2, lon2] = latlngs[i + 1];
        lon1 = normalizeLon(lon1); lon2 = normalizeLon(lon2);
        if (seg.length === 0) seg.push([lat1, lon1]);
        const d = lon2 - lon1;
        if (Math.abs(d) > 180) {
          const crossingLon = (d > 180) ? -180 : 180;
          const lon2Unwrapped = lon2 + (d > 180 ? -360 : 360);
          const denom = (lon2Unwrapped - lon1);
          const t = denom === 0 ? 0.5 : (crossingLon - lon1) / denom;
          const latCross = lat1 + t * (lat2 - lat1);
          // end current seg
          seg.push([latCross, crossingLon]); segs.push(seg);
          // start next seg
          const mirroredLon = (crossingLon === 180) ? -180 : 180;
          seg = [[latCross, mirroredLon], [lat2, lon2]];
        } else {
          seg.push([lat2, lon2]);
        }
      }
      if (seg.length) segs.push(seg);
      return segs;
    }
    function wrapToWindow(lon, ref) {
      while (lon - ref < -180) lon += 360;
      while (lon - ref >= 180) lon -= 360;
      return lon;
    }
    function recenterSegments(segments, refLon) {
      return segments.map(seg => seg.map(([lat, lon]) => [lat, wrapToWindow(lon, refLon)]));
    }

    /* =================== DRAW / REDRAW =================== */
    function redrawTrackForView() {
      if (!originalTrackLatLngs || !originalTrackLatLngs.length) return;

      const newRef = map.getCenter().lng;
      if (currentRefLon !== null && Math.abs(newRef - currentRefLon) < 90) return; // avoid thrash
      currentRefLon = newRef;

      // recompute in new window
      const segs = splitByAntimeridian(originalTrackLatLngs);
      const centered = recenterSegments(segs, currentRefLon);

      // clear existing vectors
      if (trackPolylines.length) { trackPolylines.forEach(pl => pl.remove()); trackPolylines = []; }
      if (arrowMarkers.length) { arrowMarkers.forEach(m => m.remove()); arrowMarkers = []; }

      const polyOpts = { color: '#F36257', dashArray: '5,5' };
      centered.forEach(seg => {
        if (seg.length >= 2) {
          const pl = L.polyline(seg, polyOpts).addTo(map);
          trackPolylines.push(pl);
        }
      });

      // arrows (respect window)
      const arrowSVG = `data:image/svg+xml;base64,${btoa('<svg width="12" height="12" viewBox="0 0 12 12" fill="#272932" xmlns="http://www.w3.org/2000/svg"><polygon points="6,1 1,11 11,11"/></svg>')}`;
      const arrowIcon = L.icon({ iconUrl: arrowSVG, iconSize: [12,12], iconAnchor: [6,6] });
      const spacing = 10;
      if (originalTrackPositions && originalTrackPositions.length) {
        originalTrackPositions.forEach((pos, idx) => {
          if (idx % spacing === 0 || idx === originalTrackPositions.length - 1) {
            const wrappedLon = wrapToWindow(pos.Longitude, currentRefLon);
            const latlng = [pos.Latitude, wrappedLon];
            const cog = pos.CourseOverGround || 0;
            const m = L.marker(latlng, { icon: arrowIcon, rotationAngle: cog, rotationOrigin: 'center center' }).addTo(map);
            m.bindPopup(`
              <table>
                <tr><td><strong>Destination:</strong></td><td>${pos.DestDeclared ?? ''}</td></tr>
                <tr><td><strong>COG:</strong></td><td>${pos.CourseOverGround ?? ''}</td></tr>
                <tr><td><strong>SOG:</strong></td><td>${pos.SpeedOverGround ?? ''}</td></tr>
                <tr><td><strong>Latitude:</strong></td><td>${pos.Latitude}</td></tr>
                <tr><td><strong>Longitude:</strong></td><td>${pos.Longitude}</td></tr>
                <tr><td><strong>Timestamp:</strong></td><td>${pos.ArraysTimestamp ?? pos.PositionLastUpdated ?? ''}</td></tr>
              </table>
            `, { className: 'dark-popup' });
            arrowMarkers.push(m);
          }
        });
      } else {
        // fallback if metadata missing
        originalTrackLatLngs.forEach((pt, idx) => {
          if (idx % spacing === 0 || idx === originalTrackLatLngs.length - 1) {
            const [lat, lon] = pt;
            const wrappedLon = wrapToWindow(lon, currentRefLon);
            const m = L.marker([lat, wrappedLon], { icon: arrowIcon }).addTo(map);
            arrowMarkers.push(m);
          }
        });
      }
    }
    map.on('moveend', redrawTrackForView);

    async function fetchAndShowHistoricalTracks(mmsi, startDate, endDate) {
      if (!isAuthTokenConfigured()) { showAuthTokenMissingError(); return; }
      const start = formatDateForAPI(startDate, '00:01:00Z');
      const end = endDate ? formatDateForAPI(endDate, '23:59:00Z') : formatDateForAPI(startDate, '23:59:00Z');

      const body = { MmsiNumber: String(mmsi || ''), HistoryFrom: start, HistoryUntil: end };
      const response = await fetch(HISTORICAL_TRACKS_URL, {
        method: 'POST',
        headers: { 'Authorization': AUTH_TOKEN, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!response.ok) { console.error('Failed to fetch historical tracks.'); return; }

      const data = await response.json();
      removeMarkerAndTrack(); // clear markers and old polylines
      arrowMarkers = [];

      const arr = (data && data.ApiResults && data.ApiResults.svsl_HistoricalTracks) ? data.ApiResults.svsl_HistoricalTracks : [];
      if (!arr.length) { console.warn('No svsl_HistoricalTracks in response'); return; }

      const entry = arr[0];
      const positions = entry.EnquiredDataArray || [];
      if (!positions.length) { console.warn('No EnquiredDataArray positions found'); return; }

      const latlngs = positions.map(p => [p.Latitude, p.Longitude]);
      if (!latlngs.length) { console.warn('No positions to show.'); return; }

      // cache originals for redraw-on-pan
      originalTrackLatLngs = latlngs.slice();
      originalTrackPositions = positions.slice();

      // split and recenter to an initial window (use first point’s lon)
      const segments = splitByAntimeridian(latlngs);
      const refLon = latlngs[0][1];
      currentRefLon = refLon;
      const centeredSegments = recenterSegments(segments, refLon);

      // draw
      let bounds = null;
      const polyOpts = { color: '#F36257', dashArray: '5,5' };
      centeredSegments.forEach(seg => {
        if (seg.length >= 2) {
          const pl = L.polyline(seg, polyOpts).addTo(map);
          trackPolylines.push(pl);
          bounds = bounds ? bounds.extend(pl.getBounds()) : pl.getBounds();
        } else if (seg.length === 1) {
          const b = L.latLngBounds([seg[0][0], seg[0][1]], [seg[0][0], seg[0][1]]);
          bounds = bounds ? bounds.extend(b) : b;
        }
      });
      if (bounds) map.fitBounds(bounds);
      else map.setView(centeredSegments[0][0], 14);

      // direction arrows in same window
      const arrowSVG = `data:image/svg+xml;base64,${btoa('<svg width="12" height="12" viewBox="0 0 12 12" fill="#272932" xmlns="http://www.w3.org/2000/svg"><polygon points="6,1 1,11 11,11"/></svg>')}`;
      const arrowIcon = L.icon({ iconUrl: arrowSVG, iconSize: [12,12], iconAnchor: [6,6] });
      const spacing = 10;
      positions.forEach((pos, index) => {
        if (index % spacing === 0 || index === positions.length - 1) {
          const wrappedLon = wrapToWindow(pos.Longitude, refLon);
          const latlng = [pos.Latitude, wrappedLon];
          const cog = pos.CourseOverGround || 0;
          const dirMarker = L.marker(latlng, {
            icon: arrowIcon, rotationAngle: cog, rotationOrigin: 'center center'
          }).addTo(map);
          arrowMarkers.push(dirMarker);
          dirMarker.bindPopup(`
            <table>
              <tr><td><strong>Destination:</strong></td><td>${pos.DestDeclared ?? ''}</td></tr>
              <tr><td><strong>COG:</strong></td><td>${pos.CourseOverGround ?? ''}</td></tr>
              <tr><td><strong>SOG:</strong></td><td>${pos.SpeedOverGround ?? ''}</td></tr>
              <tr><td><strong>Latitude:</strong></td><td>${pos.Latitude}</td></tr>
              <tr><td><strong>Longitude:</strong></td><td>${pos.Longitude}</td></tr>
              <tr><td><strong>Timestamp:</strong></td><td>${pos.ArraysTimestamp ?? pos.PositionLastUpdated ?? ''}</td></tr>
            </table>
          `, { className: 'dark-popup' });
        }
      });
    }

    /* =================== DATE HELPERS =================== */
    function formatDateForAPI(dateObj, time) {
      const year = dateObj.getFullYear();
      const month = String(dateObj.getMonth() + 1).padStart(2, '0');
      const day = String(dateObj.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}T${time}`;
    }
    function normalizeYearMonth(year, month) {
      if (month < 0) return { year: year - 1, month: 12 + month };
      if (month > 11) return { year: year + 1, month: month - 12 };
      return { year, month };
    }
    function generateMonthHTML(year, month, index) {
      const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      const daysOfWeek = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month+1, 0);
      const monthName = monthNames[month];
      const startDay = firstDay.getDay();
      const daysInMonth = lastDay.getDate();
      let html = `<div class="month-view" data-month-index="${index}">
                    <div class="month-header">
                      ${monthName} ${year}
                      <div class="month-arrow month-arrow-left">&lt;</div>
                      <div class="month-arrow month-arrow-right">&gt;</div>
                    </div>
                    <div class="days-header">`;
      daysOfWeek.forEach(d => { html += `<div>${d}</div>`; });
      html += `</div><div class="days-grid">`;
      for (let i = 0; i < startDay; i++) html += `<div></div>`;
      for (let d = 1; d <= daysInMonth; d++) html += `<div class="day" data-year="${year}" data-month="${month}" data-day="${d}">${d}</div>`;
      html += `</div></div>`;
      return html;
    }
    function renderMonths() {
      let month1 = normalizeYearMonth(startYear, startMonth);
      let month2 = normalizeYearMonth(month1.year, month1.month + 1);
      calendarContainer.innerHTML = generateMonthHTML(month1.year, month1.month, 0) + generateMonthHTML(month2.year, month2.month, 1);
      addCalendarListeners(); highlightSelection(); highlightToday();
    }
    function addCalendarListeners() {
      document.querySelectorAll('.day').forEach(dayEl => dayEl.addEventListener('click', handleDayClick));
      document.querySelectorAll('.month-arrow-left').forEach(arrow => arrow.addEventListener('click', handleMonthLeft));
      document.querySelectorAll('.month-arrow-right').forEach(arrow => arrow.addEventListener('click', handleMonthRight));
    }
    function handleDayClick(e) {
      const dayEl = e.target;
      const year = parseInt(dayEl.getAttribute('data-year'));
      const month = parseInt(dayEl.getAttribute('data-month'));
      const day = parseInt(dayEl.getAttribute('data-day'));
      const clickedDate = new Date(year, month, day);
      if (!startDate || (startDate && endDate)) { startDate = clickedDate; endDate = null; }
      else if (startDate && !endDate) {
        if (clickedDate < startDate) { endDate = startDate; startDate = clickedDate; }
        else { endDate = clickedDate; }
        const diffDays = Math.floor((endDate.getTime() - startDate.getTime())/(1000*3600*24)) + 1;
        if (diffDays > 31) { alert('Selection must not span more than 31 consecutive days'); endDate = null; }
      }
      highlightSelection(); highlightToday();
    }
    function highlightSelection() {
      document.querySelectorAll('.day').forEach(el => el.classList.remove('selected', 'range'));
      if (startDate && !endDate) {
        const el = findDayElement(startDate); if (el) el.classList.add('selected');
      } else if (startDate && endDate) {
        const startTime = startDate.getTime(); const endTime = endDate.getTime();
        document.querySelectorAll('.day').forEach(el => {
          const y = parseInt(el.getAttribute('data-year'));
          const m = parseInt(el.getAttribute('data-month'));
          const d = parseInt(el.getAttribute('data-day'));
          const t = new Date(y, m, d).getTime();
          if (t === startTime || t === endTime) el.classList.add('selected');
          else if (t > startTime && t < endTime) el.classList.add('range');
        });
      }
    }
    function highlightToday() {
      const today = new Date(); const el = findDayElement(today); if (el) el.classList.add('today');
    }
    function findDayElement(date) {
      if (!date) return null;
      const y = date.getFullYear(), m = date.getMonth(), d = date.getDate();
      return document.querySelector(`.day[data-year="${y}"][data-month="${m}"][data-day="${d}"]`);
    }
    function handleMonthLeft() { startMonth -= 1; let nm = normalizeYearMonth(startYear, startMonth); startYear = nm.year; startMonth = nm.month; renderMonths(); }
    function handleMonthRight() { startMonth += 1; let nm = normalizeYearMonth(startYear, startMonth); startYear = nm.year; startMonth = nm.month; renderMonths(); }
  </script>
</body>
